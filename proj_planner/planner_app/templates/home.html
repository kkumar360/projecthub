<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectHub - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .login-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header i {
            font-size: 3.5rem;
            color: #667eea;
            margin-bottom: 15px;
        }

        .login-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #0f172a;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .login-header p {
            color: #64748b;
            font-size: 0.95rem;
            margin-top: 8px;
            margin-bottom: 0;
        }

        .error-message {
            background: #fee2e2;
            border: 2px solid #fecaca;
            color: #991b1b;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .error-message i {
            font-size: 1.1rem;
        }

        .radio-group {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            padding: 18px;
            background: #f8fafc;
            border-radius: 12px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            margin-bottom: 0;
            cursor: pointer;
            font-weight: 600;
            color: #334155;
            transition: color 0.3s ease;
        }

        .radio-group label:hover {
            color: #667eea;
        }

        .radio-group input[type="radio"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .form-control {
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px 15px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.3rem rgba(102, 126, 234, 0.1);
        }

        .form-control::placeholder {
            color: #cbd5e1;
            font-weight: 500;
        }

        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-weight: 700;
            padding: 13px 20px;
            border-radius: 10px;
            width: 100%;
            margin-top: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
            color: white;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .login-footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            color: #64748b;
            font-size: 0.85rem;
        }

        .login-footer strong {
            color: #334155;
        }

        .tabs-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 12px 20px;
            font-weight: 600;
            color: #94a3b8;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-btn:hover {
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .success-message {
            background: #dcfce7;
            border: 2px solid #86efac;
            color: #15803d;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .success-message i {
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-header">
                <i class="fas fa-tasks"></i>
                <h1>ProjectHub</h1>
                <p>Manage projects and tasks efficiently</p>
            </div>

            {% if error %}
                <div class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    {{ error }}
                </div>
            {% endif %}

            {% if success %}
                <div class="success-message">
                    <i class="fas fa-check-circle"></i>
                    {{ success }}
                </div>
            {% endif %}

            <!-- Tabs -->
            <div class="tabs-container">
                <button type="button" class="tab-btn active" onclick="switchTab('login-tab', this)">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
                <button type="button" class="tab-btn" onclick="switchTab('create-admin-tab', this)">
                    <i class="fas fa-user-plus"></i> Create Admin
                </button>
            </div>

            <!-- Login Tab -->
            <div id="login-tab" class="tab-content active">
                <form method="POST" action="{% url 'home' %}">
                    {% csrf_token %}
                    <input type="hidden" name="form_type" value="login">

                    <div class="radio-group">
                        <label>
                            <input type="radio" name="user_type" value="admin" checked>
                            <i class="fas fa-crown"></i> Admin
                        </label>
                        <label>
                            <input type="radio" name="user_type" value="employee">
                            <i class="fas fa-id-badge"></i> Employee
                        </label>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="btn btn-login">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>
            </div>

            <!-- Create Admin Tab -->
            <div id="create-admin-tab" class="tab-content">
                <form method="POST" action="{% url 'create_admin' %}">
                    {% csrf_token %}

                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-id-card"></i> Admin ID</label>
                        <input type="text" name="admin_id" class="form-control" placeholder="e.g., ADM001" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-user"></i> Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-lock"></i> Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Min. 6 characters" minlength="6" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-lock"></i> Confirm Password</label>
                        <input type="password" name="confirm_password" class="form-control" placeholder="Confirm password" minlength="6" required>
                    </div>

                    <button type="submit" class="btn btn-login" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
                        <i class="fas fa-user-plus"></i> Create Admin Account
                    </button>
                </form>
            </div>

            <div class="login-footer">
                <strong>Demo Credentials:</strong><br>
                Admin: admin1 / admin123<br>
                Employee: employee1 / emp123
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function switchTab(tabId, button) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Remove active class from all buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected tab
            document.getElementById(tabId).classList.add('active');
            button.classList.add('active');
        }
    </script>
</body>
</html>
