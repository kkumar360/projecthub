<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Project Manager{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6366f1;
            --secondary-color: #8b5cf6;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --dark-bg: #0f172a;
            --light-bg: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #1e293b;
        }

        .navbar {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.15);
            padding: 1.2rem 0;
            border-bottom: none;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5em;
            color: white !important;
            letter-spacing: -0.5px;
        }

        .navbar-brand i {
            margin-right: 0.5rem;
        }

        .navbar-text {
            color: rgba(255, 255, 255, 0.9) !important;
            font-weight: 500;
        }

        .btn-light {
            background: rgba(255, 255, 255, 0.2) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            color: white !important;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-light:hover {
            background: rgba(255, 255, 255, 0.3) !important;
            border-color: rgba(255, 255, 255, 0.5) !important;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
        }

        .card-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            border: none;
            padding: 1.5rem;
            font-weight: 600;
        }

        .card-body {
            padding: 1.8rem;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            margin-bottom: 1.5rem;
            border-top: 4px solid var(--primary-color);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.2);
        }

        .stat-card h5 {
            color: #64748b;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .stat-card h3 {
            color: var(--primary-color);
            font-weight: 700;
            font-size: 2.5rem;
            margin-top: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            border: none;
            font-weight: 600;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.3);
            color: white;
        }

        .btn-success {
            background: var(--success-color);
            border: none;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.3);
        }

        .btn-info {
            background: #06b6d4;
            border: none;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .btn-info:hover {
            background: #0891b2;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.3);
        }

        .table {
            margin-bottom: 0;
        }

        .table thead th {
            background: #f1f5f9;
            color: #475569;
            font-weight: 700;
            border: none;
            padding: 1rem;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        .table tbody tr {
            border-bottom: 1px solid #e2e8f0;
            transition: all 0.2s ease;
        }

        .table tbody tr:hover {
            background-color: #f8fafc;
        }

        .table tbody td {
            padding: 1.2rem;
            vertical-align: middle;
            color: #334155;
        }

        .badge {
            padding: 0.5rem 1rem;
            font-weight: 600;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .badge-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-in-progress {
            background: #cffafe;
            color: #0c4a6e;
        }

        .badge-completed {
            background: #dcfce7;
            color: #15803d;
        }

        .form-control, .form-select {
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 0.7rem 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(99, 102, 241, 0.1);
        }

        .form-label {
            font-weight: 600;
            color: #334155;
            margin-bottom: 0.7rem;
        }

        .invalid-feedback {
            display: block;
            color: var(--danger-color);
            font-weight: 500;
            margin-top: 0.3rem;
        }

        h1, h2 {
            color: #0f172a;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .text-muted {
            color: #64748b !important;
        }

        .alert {
            border-radius: 10px;
            border: none;
            font-weight: 500;
        }

        .alert-danger {
            background: #fee2e2;
            color: #991b1b;
        }

        .alert-info {
            background: #cffafe;
            color: #0c4a6e;
        }

        .container-fluid {
            padding: 2rem 1rem;
        }

        @media (max-width: 768px) {
            .stat-card h3 {
                font-size: 2rem;
            }

            .navbar-brand {
                font-size: 1.2em;
            }
        }

        /* Dark Mode Styles */
        body.dark-mode {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
        }

        body.dark-mode .card {
            background: #1e293b;
            border: 1px solid #334155;
        }

        body.dark-mode .card-body {
            background: #1e293b;
            color: #e2e8f0;
        }

        body.dark-mode .card-header {
            background: #0f172a;
            border-bottom: 1px solid #334155;
        }

        body.dark-mode .table tbody tr:hover {
            background-color: #334155;
        }

        body.dark-mode .table thead th {
            background: #334155;
            color: #cbd5e1;
        }

        body.dark-mode .table tbody td {
            color: #cbd5e1;
            border-color: #334155;
        }

        body.dark-mode .form-control,
        body.dark-mode .form-select {
            background: #334155;
            color: #e2e8f0;
            border-color: #475569;
        }

        body.dark-mode .form-control:focus,
        body.dark-mode .form-select:focus {
            background: #334155;
            color: #e2e8f0;
        }

        body.dark-mode .form-label {
            color: #cbd5e1;
        }

        body.dark-mode .stat-card {
            background: #2d3748;
            border-color: #475569;
        }

        body.dark-mode .stat-card h5 {
            color: #a0aec0;
        }

        body.dark-mode h1, 
        body.dark-mode h2 {
            color: #e2e8f0;
        }

        body.dark-mode .text-muted {
            color: #94a3b8 !important;
        }

        .dark-mode-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white !important;
            font-weight: 600;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .dark-mode-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-tasks"></i>ProjectHub
            </a>
            <div>
                <button class="dark-mode-toggle me-2" id="darkModeToggle">
                    <i class="fas fa-moon"></i> <span id="darkModeText">Dark</span>
                </button>
                <span class="navbar-text me-3">
                    <i class="fas fa-user-circle"></i> {{ request.session.username }}
                </span>
                <a href="{% url 'logout' %}" class="btn btn-light btn-sm">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Dark Mode Toggle
        const darkModeToggle = document.getElementById('darkModeToggle');
        const darkModeText = document.getElementById('darkModeText');
        const isDarkMode = localStorage.getItem('darkMode') === 'true';

        if (isDarkMode) {
            document.body.classList.add('dark-mode');
            darkModeText.textContent = 'Light';
            darkModeToggle.innerHTML = '<i class="fas fa-sun"></i> <span id="darkModeText">Light</span>';
        }

        darkModeToggle.addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark);
            if (isDark) {
                darkModeText.textContent = 'Light';
                darkModeToggle.innerHTML = '<i class="fas fa-sun"></i> <span id="darkModeText">Light</span>';
            } else {
                darkModeText.textContent = 'Dark';
                darkModeToggle.innerHTML = '<i class="fas fa-moon"></i> <span id="darkModeText">Dark</span>';
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
